name: Database Setup

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  setup-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Create pubkey_db Database
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_HOST }} << 'EOF'
          source /root/.pubkey.env

          # Set environment variables for psql
          export PGHOST="$DB_HOST"
          export PGPORT="$DB_PORT"
          export PGUSER="$DB_USER"
          export PGPASSWORD="$DB_PASSWORD"

          echo "=== Creating pubkey_db database ==="
          psql -tc "SELECT 1 FROM pg_database WHERE datname = 'pubkey_db'" | grep -q 1 || \
          psql -c "CREATE DATABASE pubkey_db"

          echo "✅ Database created"
          EOF

      - name: Verify Database Setup
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_HOST }} << 'EOF'
          source /root/.pubkey.env

          echo "=== Verifying Database Setup ==="
          PGPASSWORD="$DB_PASSWORD" psql -U "$DB_USER" -d "pubkey_db" -c "SELECT current_database();" 2>/dev/null && echo "✅ Database verified" || echo "⚠️ Verify skipped (DB will init on container start)"
          EOF

      - name: Cleanup SSH Key
        run: rm -f ~/.ssh/id_rsa

      - name: Database Setup Complete
        run: echo "✅ Database setup completed successfully"
