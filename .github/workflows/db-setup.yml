name: Database Setup

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  setup-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Create pubkey_db Database
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_HOST }} << 'EOF'
          source /root/.pubkey.env

          echo "=== Creating pubkey_db database ==="
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USER" -tc "SELECT 1 FROM pg_database WHERE datname = 'pubkey_db'" | grep -q 1 || \
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USER" -c "CREATE DATABASE pubkey_db"

          echo "✅ Database ready"
          EOF

      - name: Verify Database Connectivity
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_HOST }} << 'EOF'
          source /root/.pubkey.env

          echo "=== Verifying database connectivity ==="
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USER" -d "pubkey_db" -c "SELECT version();" && echo "✅ Connected"
          EOF

      - name: Cleanup SSH Key
        run: rm -f ~/.ssh/id_rsa

      - name: Database Setup Complete
        run: echo "✅ Database setup completed"
