name: Deploy Backend (pubkey/api)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            SERVICE_PATH="/srv/apps/pubkey/services/api/exec"
            SERVICE_NAME="pubkey-api"
            REPO_URL="https://github.com/advcomm-DevOps/keys_server.git"

            echo "🚀 Starting Pubkey API Deployment..."

            mkdir -p $SERVICE_PATH
            cd $SERVICE_PATH

            if [ -d "pubkey" ]; then
              echo "📥 Pulling latest code..."
              cd pubkey
              git pull origin main
            else
              echo "📦 Cloning repository..."
              git clone $REPO_URL pubkey
              cd pubkey
            fi

            echo "📦 Installing dependencies..."
            npm ci

            echo "⚙️ Creating .env file..."
            cat > .env <<-'ENVEOF'
            PORT=3010
            NODE_ENV=production
            DB_HOST=localhost
            DB_PORT=5432
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=pubkey_db
            JSON_LIMIT=10mb
            ENVEOF

            echo "▶️ Restarting application with PM2..."
            pm2 restart $SERVICE_NAME || pm2 start server.js --name $SERVICE_NAME
            pm2 save

            echo "✅ Deployment completed!"
            pm2 status $SERVICE_NAME

      - name: Deployment Success
        if: success()
        run: echo "✅ pubkey-api deployed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed"
